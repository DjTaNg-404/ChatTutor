# Nginx 反向代理示例：TLS 在 Nginx 终止，后端为 Gunicorn+Uvicorn Worker
# 使用：复制到 /etc/nginx/sites-available/chattutor.conf 并调整域名与证书路径
#
# upstream 指向本机或 Docker 映射的 FastAPI 端口（默认 8000）

upstream chattutor_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;
    # 生产建议强制 HTTPS：return 301 https://$host$request_uri;

    client_max_body_size 20m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location /api/ {
        proxy_pass http://chattutor_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /docs {
        proxy_pass http://chattutor_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://chattutor_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://chattutor_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 前端静态资源（若由 Nginx 托管 build 产物）
    location / {
        root /var/www/chattutor-dashboard;
        try_files $uri $uri/ /index.html;
    }
}

